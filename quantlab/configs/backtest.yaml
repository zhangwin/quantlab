# Default backtest configuration
start_date: "2023-01-01"
end_date: "2025-03-01"
market: "csi300"
initial_cash: 1000000

# Data
qlib_data_dir: "~/.qlib/qlib_data/cn_data"

# Pipeline switches
enable_alpha: true
enable_kronos: true
enable_rdagent: false

# M2 Alpha158
alpha_retrain_interval: 20
alpha_train_years: 3

# M3 Kronos
kronos_recipe_name: "conservative"
kronos_device: "cuda"

# M5 Ensemble
ensemble_ic_lookback: 60
ensemble_uncertainty_penalty: 0.1

# M6 Execution
max_positions: 10
max_single_weight: 0.20
target_buy_count: 3
target_sell_count: 3

# M7 Risk
stop_loss_pct: 0.08
max_hold_days: 60
max_industry_pct: 0.30
circuit_breaker_pct: 0.10
pause_days: 5

# Runtime
random_seed: 42
checkpoint_interval: 50
benchmark: "SH000300"
log_level: "INFO"
